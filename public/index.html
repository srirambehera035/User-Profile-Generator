<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Profile card generator</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="wrap">
  <p class="eyebrow">Profile card generator</p>
  <h1>Issue a new card</h1>

  <div class="panel">
    <form id="profile-form">
      <label for="name">Name</label>
      <input id="name" name="name" type="text" placeholder="Ada Lovelace" />

      <label for="bio">Bio</label>
      <textarea id="bio" name="bio" placeholder="Mathematician and writer, known for work on the Analytical Engine."></textarea>

      <label for="imageUrl">Image URL</label>
      <input id="imageUrl" name="imageUrl" type="text" placeholder="https://example.com/photo.jpg" />

      <button type="submit" id="submit-btn">Submit</button>
      <div class="status" id="status-line"></div>
    </form>
  </div>

  <div class="panel is-empty" id="result-panel">
    <p class="empty" id="empty-state">No card issued yet. Fill in the form and submit.</p>
  </div>
</div>

<script>
const form = document.getElementById('profile-form');
const submitBtn = document.getElementById('submit-btn');
const statusLine = document.getElementById('status-line');
const resultPanel = document.getElementById('result-panel');

function escapeHtml(str) {
  const div = document.createElement('div');
  div.innerText = str;
  return div.innerHTML;
}

function initials(name) {
  return name.trim().split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase();
}

function pad(num, size) {
  return String(num).padStart(size, '0');
}

function renderCard(profile) {
  resultPanel.classList.remove('is-empty');

  const avatarHtml = profile.imageUrl
    ? `<img class="avatar" src="${escapeHtml(profile.imageUrl)}"
         onerror="this.outerHTML='<div class=&quot;avatar-fallback&quot;>${initials(profile.name)}</div>'" />`
    : `<div class="avatar-fallback">${initials(profile.name)}</div>`;

  resultPanel.innerHTML = `
    <div class="id-card">
      <div class="id-card-top">
        ${avatarHtml}
        <div>
          <p class="card-name">${escapeHtml(profile.name)}</p>
          <span class="card-tag">Member</span>
        </div>
      </div>
      <p class="id-card-serial">No. ${pad(profile.id, 4)} &middot; issued ${new Date(profile.createdAt).toLocaleDateString()}</p>
      <p class="card-bio">${escapeHtml(profile.bio)}</p>
    </div>
  `;
}

function renderErrors(errors) {
  resultPanel.classList.add('is-empty');
  resultPanel.innerHTML = `<div class="error-box">${errors.map(escapeHtml).join('<br>')}</div>`;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const payload = {
    name: document.getElementById('name').value,
    bio: document.getElementById('bio').value,
    imageUrl: document.getElementById('imageUrl').value
  };

  submitBtn.disabled = true;
  submitBtn.textContent = 'Submitting...';
  statusLine.textContent = 'POST /api/profile';

  try {
    const res = await fetch('/api/profile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const body = await res.json();

    if (!res.ok) {
      statusLine.textContent = `${res.status} ${res.statusText}`;
      renderErrors(body.errors || ['Something went wrong.']);
    } else {
      statusLine.textContent = `${res.status} ${res.statusText}`;
      renderCard(body.data);
    }
  } catch (err) {
    statusLine.textContent = 'Network error';
    renderErrors(['Could not reach the server. Is it running?']);
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Submit';
  }
});
</script>
</body>
</html>
